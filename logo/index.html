<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHANI BIG IMAGE STUDIO Animation</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
  
  :root {
    --bg-start: #0f0f14;
    --bg-end: #1a1a24;
    --glow-color: #ff6b35;
    --text-color: #ffffff;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 50% 50%, var(--bg-end) 0%, var(--bg-start) 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    color: var(--text-color);
  }

  .logo-container {
    position: relative;
    width: min(90vw, 500px);
    height: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0rem;
  }

  .logo-wrapper {
    position: relative;
    animation: float 6s ease-in-out infinite;
    will-change: transform;
  }

  .logo-img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.5));
    animation: fadeInScale 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }

  .lens-overlay {
    position: absolute;
    top: 37%;
    left: 51%;
    width: 22%;
    aspect-ratio: 1/1;
    border-radius: 100%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(226, 115, 77, 0.15) 0%, transparent 70%);
    animation: lensFocus 3s ease-in-out infinite;
    animation-delay: 1.2s;
    pointer-events: none;
    opacity: 0;
    transform-origin: center center;
  }

  .lens-overlay::before {
    content: '';
    position: absolute;
    inset: 10%;
    border-radius: 50%;
    border: 2px solid rgba(255, 107, 53, 0.3);
    border-top-color: rgba(255, 107, 53, 0.8);
    border-right-color: transparent;
    animation: lensRotate 6s linear infinite;
    animation-delay: 1.2s;
  }

  .lens-overlay::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 30%;
    height: 30%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
    transform: translate(-50%, -50%);
  }

  .text-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,107,53,0.25) 0%, transparent 65%);
    animation: textGlow 4s ease-in-out infinite;
    animation-delay: 1.4s;
    opacity: 0;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  @keyframes fadeInScale {
    0% {
      opacity: 0;
      transform: scale(0.8);
    }
    100% {
      opacity: 1;
      transform: scale(1);
    }
  }

  @keyframes float {
    0%, 100% {
      transform: translateY(0px);
    }
    50% {
      transform: translateY(-15px);
    }
  }

  @keyframes lensFocus {
    0% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.9);
    }
    20% {
      opacity: 1;
    }
    50% {
      transform: translate(-50%, -50%) scale(1.05);
      opacity: 0.8;
    }
    100% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.9);
    }
  }

  @keyframes lensRotate {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(360deg);
    }
  }

  @keyframes textGlow {
    0%, 100% {
      opacity: 0;
    }
    50% {
      opacity: 1;
    }
  }

  .btn-replay {
    margin-top: 1rem;
    padding: 0.875rem 2rem;
    font-size: 1rem;
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(255, 107, 53, 0.35);
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
    backdrop-filter: blur(10px);
  }

  .btn-replay:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(255, 107, 53, 0.5);
  }

  .btn-replay:active {
    transform: translateY(0);
    box-shadow: 0 4px 12px rgba(255, 107, 53, 0.35);
  }

  .footer {
    position: fixed;
    bottom: 1rem;
    font-size: 0.875rem;
    color: rgba(255, 255, 255, 0.4);
    text-align: center;
    width: 100%;
    padding: 0 1rem;
  }

  .reset-animation * {
    animation: none !important;
    opacity: 0 !important;
  }

  @media (max-width: 390px) {
    .btn-replay {
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      margin-top: 1.5rem;
    }
    .footer {
      font-size: 0.75rem;
      bottom: 1rem;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .logo-wrapper, .logo-img, .lens-overlay, .text-glow, .lens-overlay::before {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }
</style>
</head>

  <script>
    const replayBtn = document.getElementById('replayBtn');
    const logoContainer = document.getElementById('logoContainer');
    const logoImg = document.getElementById('logoImg');

    function replayAnimation() {
      const elements = logoContainer.querySelectorAll('*');
      elements.forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight; // Trigger reflow
      });
      
      logoContainer.classList.add('reset-animation');
      
      setTimeout(() => {
        logoContainer.classList.remove('reset-animation');
        elements.forEach(el => {
          el.style.animation = '';
        });
      }, 50);
    }

    replayBtn.addEventListener('click', replayAnimation);

    // Preload image
    logoImg.addEventListener('load', () => {
      if (logoImg.complete) {
        logoContainer.style.opacity = '1';
      }
    });
  </script>
